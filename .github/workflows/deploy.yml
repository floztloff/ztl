name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API key
        run: |
          echo "(function(){window._ztlClaudeKey=\"${{ secrets.ANTHROPIC_API_KEY }}\";try{localStorage.setItem('_ztlClaudeKey','${{ secrets.ANTHROPIC_API_KEY }}');}catch(e){}})();" > api-init.js

      - name: Prepare deploy folder
        run: |
          mkdir -p _site
          cp index.html app.js storage.js supabase.js auth-ui.js auth-wrapper.js manifest.json service-worker.js icon-192.svg icon-512.svg api-init.js _site/
          cp -r libs _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
