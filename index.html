<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ZTL">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FBF4EC">
  <meta name="description" content="ZTL — LIFE IS YOURS. Routine quotidienne : séances, nutrition, sommeil.">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="icon-192.svg">

  <title>ZTL — LIFE IS YOURS</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: "Onest", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #FBF4EC;
      color: #241712;
      line-height: 1.4;
    }
    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; }
    img { max-width: 100%; height: auto; display: block; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #EFE6DB; border-radius: 4px; }
    #loader {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 12px; color: #9A8C7E; font-size: 14px;
      padding-top: env(safe-area-inset-top,0); padding-bottom: env(safe-area-inset-bottom,0);
    }
    #loader .spinner { width: 32px; height: 32px; border: 3px solid #EFE6DB; border-top-color: #F2543D; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"><div id="loader"><div class="spinner"></div><div>ZTL se prépare…</div></div></div>

  <script>
    window.onerror = function(msg, url, line, col, err) {
      var stack = (err && err.stack) ? '\n\n' + err.stack : '';
      document.getElementById('root').innerHTML =
        '<div style="color:#F2543D;padding:30px;font-family:monospace;white-space:pre-wrap;font-size:13px;text-align:left;max-width:600px;margin:0 auto">' +
        '<h2 style="color:#F2543D;text-align:center">Erreur ZTL</h2>' +
        msg + '\n' + (url || '') + ':' + line + ':' + col + stack + '</div>';
      return true;
    };
  </script>

  <script src="libs/react.production.min.js"></script>
  <script src="libs/react-dom.production.min.js"></script>
  <script src="libs/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="storage.js"></script>
  <script src="auth-ui.js"></script>

  <script>
    (function() {
      var r = window.React;
      var rd = window.ReactDOM;
      if (!r || !rd) {
        document.getElementById('root').innerHTML =
          '<div style="color:#F2543D;padding:30px;font-family:monospace;font-size:13px;text-align:center">Erreur : React ou ReactDOM introuvable.</div>';
        return;
      }
      window.require = function(name) {
        if (name === "react") return r;
        if (name === "react-dom") return rd;
        throw new Error('Module introuvable : ' + name);
      };
    })();
  </script>

  <script src="app.js"></script>
  <script src="auth-wrapper.js"></script>
</body>
</html>
