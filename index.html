<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ZTL">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#13151A">
  <meta name="description" content="ZTL — Ta routine quotidienne : séances, nutrition, sommeil">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="icon-192.svg">

  <title>ZTL — Ta Routine</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #13151A;
      color: #ECEEF2;
      line-height: 1.4;
    }
    button { font-family: inherit; }
    input, select, textarea { font-family: inherit; }
    img { max-width: 100%; height: auto; display: block; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2C323D; border-radius: 4px; }
    #loader {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 12px; color: #8B94A4; font-size: 14px; 
      padding-top: env(safe-area-inset-top,0); padding-bottom: env(safe-area-inset-bottom,0);
    }
    #loader .spinner { width: 32px; height: 32px; border: 3px solid #2C323D; border-top-color: #FF7A3D; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"><div id="loader"><div class="spinner"></div><div>ZTL se prépare…</div></div></div>

  <script src="libs/react.production.min.js"></script>
  <script src="libs/react-dom.production.min.js"></script>
  <script src="storage.js"></script>
  <script src="icons.js"></script>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      document.getElementById('root').innerHTML = '<div style="color:#FF7A3D;padding:20px;font-family:monospace;white-space:pre-wrap;font-size:13px">' +
        '<h2 style="color:#FF7A3D">Erreur ZTL</h2>' +
        msg + '\n' + (url||'') + ':' + line + ':' + col +
        (err && err.stack ? '\n\n' + err.stack : '') + '</div>';
      return true;
    };
  </script>
  <script src="app.js"></script>
</body>
</html>
