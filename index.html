<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ZTL">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FBF4EC">
  <meta name="description" content="ZTL — LIFE IS YOURS. Routine quotidienne : séances, nutrition, sommeil.">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="icon-192.svg">

  <title>ZTL — LIFE IS YOURS</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: "Onest", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #FBF4EC;
      color: #241712;
      line-height: 1.4;
    }
    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; }
    img { max-width: 100%; height: auto; display: block; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #EFE6DB; border-radius: 4px; }
    #loader {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 12px; color: #9A8C7E; font-size: 14px;
      padding-top: env(safe-area-inset-top,0); padding-bottom: env(safe-area-inset-bottom,0);
    }
    #loader .spinner { width: 32px; height: 32px; border: 3px solid #EFE6DB; border-top-color: #F2543D; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"><div id="loader"><div class="spinner"></div><div>ZTL se prépare…</div></div></div>

  <!-- React UMD (via CDN car on ne peut pas bundler react localement) -->
  <script src="libs/react.production.min.js"></script>
  <script src="libs/react-dom.production.min.js"></script>

  <!-- Polyfill require() pour que le bundle esbuild trouve React -->
  <script>
    // esbuild iife use __require("react") and __require("react/jsx-runtime")
    // We shim these so they map to the global React/ReactDOM
    if (typeof require === "undefined") {
      var require = function(name) {
        if (name === "react" || name === "react/jsx-runtime") return window.React;
        if (name === "react-dom") return window.ReactDOM;
        throw new Error("Cannot find module '" + name + "'");
      };
    }
  </script>

  <!-- Couche de stockage (window.storage API utilisée par l'app) -->
  <script src="storage.js"></script>

  <!-- L'application compilée -->
  <script src="app.js"></script>

  <script>
    // Monter l'application React
    window.addEventListener('DOMContentLoaded', function() {
      const root = document.getElementById('root');
      if (root && window.ZTL && window.ZTL.default) {
        ReactDOM.createRoot(root).render(React.createElement(window.ZTL.default));
      }
    });
  </script>
</body>
</html>
